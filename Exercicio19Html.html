<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 19 - HTML Formulários - Elementos Input</title>
</head>
<body>
    <form action="" method="post">
        <fieldset>
            <legend>Preencha o Formulario</legend>
            <div>
                <label for="">Nome Completo</label> <br>
                <input type="text" name="txtNomeCompleto" id="txtNomeCompleto" required maxlength="100">
            </div>
            <br>
            <div>
                 <label for="">Email</label> <br>
                <input type="email" name="TxtEmail" id="TxtEmail" required placeholder="email@gmail.com" maxlength="100">
            </div>
            <br>
            <div>
                <label for="">Digite a sua Idade</label> <br>
                <input type="number" name="TxtIdade" id="TxtIdade" min="14" max="100" maxlength="3" step="1">
            </div>
            <br>
            <div>
            <label for="">Data do Evento</label>
            <input type="date" name="" id="" min="2026-03-31">
        </div>
            <br>
            <div>
                <label for="">Digite o Horario o horario preferido</label>
                <input type="time" name="TxtHorarioCompromisso" id="TxtHorarioCompromisso">
            </div>
            <br>
            <div>
                <label for="">Modalidade do Evento</label><br>
                <input type="radio" name="rdDestino" id="rdDestino" value="1"> Reunião <br>
                <input type="radio" name="rdDestino" id="rdDestino" value="2"> Almoço <br>
                <input type="radio" name="rdDestino" id="rdDestino" value="3"> Reunião de Negocios <br>
                <input type="radio" name="rdDestino" id="rdDestino" value="4"> Comemoração <br>
            </div>
            <br>
            <div>
                <label for="">Area de Interesse</label>
                <select name="cboEstadocivil" id="cboEstadoCivil">
                <option value="1">Recurso Humanos</option>
                <option value="2">Front-end</option>
                <option value="3">Back-end</option>
                <option value="4">Full Stack</option>
                <option value="5">Cyber-Security</option>
                </select>
            </div>
            <br>
            <div>
                <label for="">Qual a sua Região</label>
                <select name="cboRegiao" id="cboRegiao">
                    <option value="1">Norte</option>
                    <option value="2">Sul</option>
                    <option value="3">Nordeste</option>
                    <option value="4">Sudeste</option>
                    <option value="5">Centro Oeste</option>
                </select>
            </div>
            <br>
            <div>
                <label for="">Cor do Crachá</label>
                <input type="color" name="Txtcor" id="Txtcor" required>
            </div>
            <br>
            <div>
                <label for="">Nivel de Expectativa</label>
                <input type="range" name="TxtExpectativaRange" id="TxtExpectativaRange" required, min="1" max="5" step="0">
            </div>
            <br>
            <button>Enviar</button>
            <button>Limpar</button>
            <br>
        </fieldset>
    </form>
</body>
</html>
