<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 15 - HTML Formulários - Elementos Input</title>
</head>
<body>
    <form action="paginaDestino.apsx" method="post">
        <fieldset>
            <legend>Cadastro de Preferências</legend>
            <div>
                <label for="">Nome</label>
                <input type="text" name="TxtNome" id="TxtNome" required maxlength="100">
            </div>
            <br>
            <div>
                <label for="">Email</label>
                <input type="email" name="TxtEmail" id="TxtEmail" placeholder="jose@gmail.com">
            </div>
            <br>
            <div>
                <label for="">Selecione um ou mais Generos de filmes</label><br>
                <input type="checkbox" name="chkGenero" id="chkGenero" value="1"> Romance <br>
                <input type="checkbox" name="chkGenero" id="chkGenero" value="2"> Ficção <br>
                <input type="checkbox" name="chkGenero" id="chkGenero" value="3"> Terros <br>
                <input type="checkbox" name="chkGenero" id="chkGenero" value="4"> Comedia <br>
                <input type="checkbox" name="chkGenero" id="chkGenero" value="5"> Ação <br>
                <input type="checkbox" name="chkGenero" id="chkGenero" value="6"> Épico <br>
            </div>
            <br>
            <div>
                <label for="">Selecione um destino Favorito</label><br>
                <input type="radio" name="rdDestino" id="rdDestino" value="1"> Cachoeira <br>
                <input type="radio" name="rdDestino" id="rdDestino" value="2"> Praia <br>
                <input type="radio" name="rdDestino" id="rdDestino" value="3"> Rural <br>
                <input type="radio" name="rdDestino" id="rdDestino" value="4"> Montanha <br>
            </div>
            <br>
            <div>
                <label for="">Selecione uma região favorita</label>
                <select name="cboRegiao" id="cboRegiao">
                    <option value="1">Norte</option>
                    <option value="2">Sul</option>
                    <option value="3">Nordeste</option>
                    <option value="4">Sudeste</option>
                    <option value="5">Centro Oeste</option>
                </select>
            </div>
            <button>Enviar</button>
    </fieldset>
    </form>
</body>
</html>
