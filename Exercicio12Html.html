<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 12 - Formularios</title>
</head>
<body>
    <form action="paginadestino.php" method="get">
    <fieldset>
        <legend>Dados Pessoais</legend>
        <div>
            <label for="">CPF</label><br>
            <input type="text" name="txtCPF" id="txtCPF">
        </div>
        <br>
        <div>
            <label for="">Nome</label><br>
            <input type="text" name="txtNome" id="txtNome">
        </div>
        <br>
        <div>
            <label for="">Ano de Nascimento</label><br>
            <input type="number" name="txtAnoNascimento" id="txtAnoNascimento">
        </div>
        <br>
        <div>
            <label for="">Estado Civil</label><br>
            <select name="cboEstadocivil" id="cboEstadoCivil">
                <option value="1">Solteiro</option>
                <option value="2">Casado</option>
                <option value="3">Viuvo</option>
                <option value="4">Tico-tico no fuba</option>
                <option value="5">Terrivel</option>
                <option value="6">Outros</option>
            </select>
        </div>
        <br>
        <div>
            <label for="">Sexo</label>
            <br>
            <input type="radio" name="rdSexo" id="rdSexo" value="0"> Feminino
            <input type="radio" name="rdSexo" id="rdSexo" value="1"> Masculino
        </div>
    </fieldset>
    <fieldset>
        <legend>Dados Profissionais</legend>
        <div>
            <label for="">Cargo</label><br>
            <input type="radio" name="rdCargo" id="rdCargo" value="0"> Gerente administrativo <br>
            <input type="radio" name="rdCargo" id="rdCargo" value="1"> Gerente Financeiro <br>
            <input type="radio" name="rdCargo" id="rdCargo" value="2"> Gerente de Redes <br>
            <input type="radio" name="rdCargo" id="rdCargo" value="3"> Gerente de Desenvolvimento <br>
        </div>
        <div>
            <label for="">Area de Interesse</label><br>
            <input type="checkbox" name="chkAreaInteresse" id="chkAreaInteresse" value="1"> Requisitos
            <input type="checkbox" name="chkAreaInteresse" id="chkAreaInteresse" value="2"> RH
            <input type="checkbox" name="chkAreaInteresse" id="chkAreaInteresse" value="3"> Infraestrutura
            <input type="checkbox" name="chkAreaInteresse" id="chkAreaInteresse" value="4"> Ciencias de Dados
        </div>
    </fieldset>
    <br>
    <div>
        <button type="submit">Enviar</button>
    </div>

    </form>
</body>
</html>
