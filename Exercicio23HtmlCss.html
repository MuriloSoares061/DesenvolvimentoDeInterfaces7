<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Seletores CSS</title>
  <style>

    /* SELETOR DE TIPO — afeta todos os elementos daquela tag */

    h1 {
        color: blue;
        font-family: cursive;
        font-weight: bold;
        
    }

    p {
        text-align: justify;
    }

    a {
        text-align: justify;
    }

    li {
        text-align: justify;
        color: blue;
        margin: 25px;
        font-family: 'Courier New', Courier, monospace;
    }


    /* SELETOR DE CLASSE — afeta elementos com class="..." */

    .destaque {
        color: blue;
        margin: 25px;
        padding: 20px;
        border-left: green solid 6px;
        text-align: justify;
        font-size: 20px;
        box-shadow: rgba(50, 50, 93, 0.25) 0px 6px 12px -2px, rgba(0, 0, 0, 0.3) 0px 3px 7px -3px;
    }

    .alerta {
        color: blue;
        margin: 25px;
        padding: 20px;
        border-left: green solid 6px;
        text-align: justify;
        font-size: 20px;
        box-shadow: rgba(50, 50, 93, 0.25) 0px 6px 12px -2px, rgba(0, 0, 0, 0.3) 0px 3px 7px -3px;
    }

    .secundario {
        color: blue;
        margin: 25px;
        padding: 20px;
        border-left: green solid 6px;
        text-align: justify;
        font-size: 20px;
        box-shadow: rgba(50, 50, 93, 0.25) 0px 6px 12px -2px, rgba(0, 0, 0, 0.3) 0px 3px 7px -3px;
    }


    /* SELETOR DE ID — afeta o elemento único com id="..." */

    #cabecalho {
        color: pink;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 25px auto;
        padding: 20px;
        box-shadow: rgba(50, 50, 93, 0.25) 0px 6px 12px -2px, rgba(0, 0, 0, 0.3) 0px 3px 7px -3px;
        border-top: solid darkblue 8px;
    }

    #rodape {
        color: aqua;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 25px auto;
        padding: 20px;
    }

  </style>
</head>
<body>

  <header id="cabecalho">
    <h1>Título da Página</h1>
  </header>

  <main>
    <p>Parágrafo comum.</p>
    <p class="destaque">Parágrafo com classe destaque.</p>
    <p class="alerta">Parágrafo com classe alerta.</p>
    <p class="secundario">Parágrafo com classe secundario.</p>

    <ul>
      <li>Item comum</li>
      <li class="destaque">Item com classe destaque</li>
      <li class="alerta">Item com classe alerta</li>
    </ul>

    <a href="#">Link comum</a>
  </main>

  <footer id="rodape">
    <p>Rodapé da página.</p>
  </footer>

</body>
</html>
